<!DOCTYPE html>
<html>
<head>
    <title>SSL/TLS Demo</title>
</head>
<body>
    <h1>SSL/TLS Client Demo</h1>
    <hr>
    
    <h3>Server URL:</h3>
    <input type="text" id="serverUrl" value="https://localhost:3443/api" size="50">
    <br><br>
    
    <button onclick="testConnection()">Test Koneksi</button>
    <button onclick="clearOutput()">Clear</button>
    <br><br>
    
    <h3>Kirim Data:</h3>
    Nama: <input type="text" id="nama" value="Mikhael Agung"><br><br>
    NPM: <input type="text" id="npm" value="123456789"><br><br>
    Mata Kuliah: <input type="text" id="matkul" value="Keamanan Jaringan"><br><br>
    <button onclick="sendData()">Kirim Data</button>
    <br><br>
    
    <h3>Output:</h3>
    <textarea id="output" rows="20" cols="80" readonly></textarea>

    <script>
        function log(msg) {
            document.getElementById('output').value += msg + '\n';
        }
        
        function clearOutput() {
            document.getElementById('output').value = '';
        }
        
        async function testConnection() {
            const url = document.getElementById('serverUrl').value;
            log('='.repeat(50));
            log('Testing SSL/TLS Connection...');
            log('URL: ' + url);
            
            try {
                const response = await fetch(url);
                const data = await response.json();
                
                log('Status: ' + response.status);
                log('Response: ' + JSON.stringify(data, null, 2));
                log('Success!');
            } catch (error) {
                log('Error: ' + error.message);
            }
            log('');
        }
        
        async function sendData() {
            const url = document.getElementById('serverUrl').value;
            const payload = {
                nama: document.getElementById('nama').value,
                npm: document.getElementById('npm').value,
                mata_kuliah: document.getElementById('matkul').value,
                timestamp: new Date().toISOString()
            };
            
            log('='.repeat(50));
            log('Sending data...');
            log('Payload: ' + JSON.stringify(payload, null, 2));
            
            try {
                const response = await fetch(url, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(payload)
                });
                const data = await response.json();
                
                log('Status: ' + response.status);
                log('Response: ' + JSON.stringify(data, null, 2));
                log('Success!');
            } catch (error) {
                log('Error: ' + error.message);
            }
            log('');
        }
    </script>
</body>
</html>
